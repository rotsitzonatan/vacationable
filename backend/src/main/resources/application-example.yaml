spring:
  application:
    name: backend

  datasource:
    url: jdbc:postgresql://localhost:5432/vacationable
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

jwt:
  secret: ${JWT_SECRET:CHANGE_THIS_TO_A_SECURE_32_CHARACTER_KEY}
  expiration: 86400000
